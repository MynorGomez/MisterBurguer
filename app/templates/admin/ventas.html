
{% extends "base_panel.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<main class="content">    
<div class="topbar">
        <h1>Ventas</h1>
        <a class="btn" href="{{ url_for('admin.dashboard_admin') }}">Volver</a>
    </div>
    <div class="panel">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Tipo</th>
                    <th>Método pago</th>
                    <th>Pedido</th>
                    <th>Total</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for v in ventas %}
                    <tr>
                        <td>{{ v[0] }}</td>
                        <td>{{ v[1] }}</td>
                        <td>{{ v[2] }}</td>
                        <td>{{ v[3] }}</td>
                        <td>{{ v[6] if v[6] else 'Sin pedido' }}</td>
                        <td>Q {{ "%.2f"|format(v[4]) }}</td>
                        <td>{{ v[5] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</main>
{% endblock %}
