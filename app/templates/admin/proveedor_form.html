{% extends "base_panel.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<!-- Notificación Emergente de Guardando -->
<div class="loading-notification" id="loadingNotif">
    <div class="loading-spinner"></div>
    <div class="loading-text">
        <h3>Guardando información</h3>
        <p>Por favor espera...</p>
    </div>
</div>

<div class="modal-overlay" id="formModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>{% if proveedor %}Editar{% else %}Nuevo{% endif %} Proveedor</h2>
            <a href="{{ url_for('admin.listar_proveedores') }}" class="modal-close">&times;</a>
        </div>
        
        <form method="POST" class="form-modal" id="proveedorForm">
            <div class="form-group">
                <label>Nombre empresa</label>
                <input type="text" name="nombre_empresa" required
                       value="{{ proveedor[1] if proveedor else '' }}" placeholder="Nombre de la empresa">
            </div>

            <div class="form-group">
                <label>Nombre contacto</label>
                <input type="text" name="contacto_nombre"
                       value="{{ proveedor[2] if proveedor else '' }}" placeholder="Nombre del contacto">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" name="telefono"
                           value="{{ proveedor[3] if proveedor else '' }}" placeholder="Teléfono">
                </div>

                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" name="correo"
                           value="{{ proveedor[4] if proveedor else '' }}" placeholder="correo@ejemplo.com">
                </div>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="direccion"
                       value="{{ proveedor[5] if proveedor else '' }}" placeholder="Dirección completa">
            </div>

            <div class="form-group">
                <label>NIT</label>
                <input type="text" name="nit"
                       value="{{ proveedor[6] if proveedor else '' }}" placeholder="NIT">
            </div>

            {% if proveedor %}
                <div class="form-group">
                    <label>Estado</label>
                    <select name="estado">
                        <option value="activo" {% if proveedor[7] == 'activo' %}selected{% endif %}>Activo</option>
                        <option value="inactivo" {% if proveedor[7] == 'inactivo' %}selected{% endif %}>Inactivo</option>
                    </select>
                </div>
            {% endif %}

            <div class="form-actions">
                <a href="{{ url_for('admin.listar_proveedores') }}" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-guardar" id="submitBtn">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Mostrar notificación al enviar formulario con espera de 5 segundos
    document.getElementById('proveedorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        document.getElementById('loadingNotif').classList.add('show');
        document.getElementById('submitBtn').disabled = true;
        
        // Esperar 5 segundos antes de enviar el formulario
        setTimeout(function() {
            document.getElementById('proveedorForm').submit();
        }, 5000);
    });

    // Cerrar modal al hacer clic fuera del contenido
    document.getElementById('formModal').addEventListener('click', function(event) {
        if (event.target === this) {
            window.location.href = "{{ url_for('admin.listar_proveedores') }}";
        }
    });
</script>
{% endblock %}
